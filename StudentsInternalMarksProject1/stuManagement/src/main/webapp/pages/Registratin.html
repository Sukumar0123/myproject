<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result</title>

<style>

:root{
    --navy:#0b2e4a;
    --navy2:#08304f;
    --saffron:#ff9933;
    --bg:#f5f7fa;
    --card:#ffffff;
    --text:#1f2a37;
    --border:#d9e2ec;
    --shadow:0 6px 18px rgba(11,46,74,0.15);
}

/* PAGE */
body{
    font-family:Arial;
    background:var(--bg);
    margin:0;
    text-align:center;
    color:var(--text);
}

/* HEADER */
header{
    display:flex;
    justify-content:space-evenly;
    align-items:center;
    padding:18px;
    background:linear-gradient(90deg,var(--navy),var(--navy2));
    color:white;
    border-bottom:4px solid var(--saffron);
}

header img{
    border-radius:50%;
    background:white;
    padding:6px;
    box-shadow:0 6px 16px rgba(0,0,0,0.25);
}

header h2{
    margin:0;
    font-family:"Segoe UI",sans-serif;
}

/* NAVIGATION */
nav{
    display:flex;
    justify-content:center;
    background:white;
    padding:10px;
    border-bottom:1px solid var(--border);
}

nav div{
    margin:0 12px;
}

nav a{
    text-decoration:none;
    color:var(--navy);
    font-weight:bold;
    padding:8px 12px;
    border-radius:6px;
    transition:0.3s;
}

nav a:hover{
    background:rgba(255,153,51,0.15);
}

/* TITLES */
h1{
    color:var(--navy);
    margin-top:25px;
}

/* SECTION CARDS */
section{
    background:var(--card);
    max-width:500px;
    margin:20px auto;
    padding:22px;
    border-radius:12px;
    border:1px solid var(--border);
    box-shadow:var(--shadow);
    position:relative;
}

/* GOVT ACCENT BAR */
section::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:4px;
    background:var(--saffron);
    border-radius:12px 12px 0 0;
}

section div{
    margin:12px 0;
}

/* DASHBOARD LINKS */
section a{
    display:block;
    padding:12px;
    background:#f8fafc;
    text-decoration:none;
    font-weight:bold;
    border-radius:8px;
    border:1px solid var(--border);
    color:var(--navy);
    transition:0.3s;
}

section a:hover{
    background:var(--navy);
    color:white;
}

</style>
</head>
