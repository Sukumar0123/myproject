<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>
    <style>
    :root{
        --navy:#0b2e4a;
        --navy2:#08304f;
        --saffron:#ff9933;
        --green:#138808;
        --bg:#f5f7fa;
        --card:#ffffff;
        --text:#1f2a37;
        --muted:#6b7280;
        --border:#d9e2ec;
        --shadow: 0 6px 18px rgba(11,46,74,0.15);
    }

    body{
        margin:0;
        font-family: Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
    }

    /* HEADER */
    header {
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        padding: 18px 20px;
        background: linear-gradient(90deg, var(--navy), var(--navy2));
        color: white;
        border-bottom: 4px solid var(--saffron);
        animation: fadeDown 1s ease;
    }
    header h2{
        color:#fff;
        margin:0;
        letter-spacing:0.3px;
        font-family: "Segoe UI", sans-serif;
    }
    header img {
        border-radius: 50%;
        background:#fff;
        padding:6px;
        box-shadow: 0 6px 16px rgba(0,0,0,0.22);
    }

    /* NAVIGATION */
    nav {
        display: flex;
        justify-content: center;
        background: #ffffff;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 10;
    }
    nav div {
        position: relative;
        margin: 0 12px;
    }
    nav a {
        text-decoration: none;
        color: var(--navy);
        font-weight: 700;
        padding: 10px 12px;
        border-radius: 6px;
        transition: background 0.2s ease, color 0.2s ease;
        display: inline-block;
    }
    nav a:hover {
        background: rgba(255,153,51,0.15);
        color: var(--navy);
    }

    /* DROPDOWN MENU */
    .menu {
        display: none;
        position: absolute;
        background: #ffffff;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px;
        min-width: 180px;
        box-shadow: var(--shadow);
        animation: fadeIn 0.25s ease;
        top: 45px;
        left: 0;
    }
    .menu div {
        margin: 6px 0;
    }
    .menu a{
        color: var(--text);
        font-weight: 600;
        width: 100%;
    }
    .menu a:hover{
        background: rgba(11,46,74,0.06);
    }
    nav div:hover .menu {
        display: block;
    }

    /* FACULTY SECTION */
    section {
        background-color: var(--card);
        padding: 34px 24px;
        border-radius: 16px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        width: 80%;
        margin: 30px auto;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        animation: fadeIn 0.6s ease;
    }

    .faculty-card {
        background: #ffffff;
        border-radius: 16px;
        text-align: center;
        padding: 20px;
        border: 1px solid var(--border);
        box-shadow: 0 10px 22px rgba(0,0,0,0.10);
        transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
        position: relative;
        overflow: hidden;
    }

    /* Govt accent bar */
    .faculty-card::before{
        content:"";
        position:absolute;
        top:0; left:0;
        width:100%;
        height:5px;
        background: var(--saffron);
    }

    .faculty-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 16px 30px rgba(11,46,74,0.18);
        border-color: rgba(11,46,74,0.25);
    }

    .faculty-card img {
        width: 120px;
        height: 120px;
        object-fit: cover;
        border-radius: 50%;
        border: 4px solid #ffffff;
        box-shadow: 0px 6px 14px rgba(0,0,0,0.18);
        margin-top: 8px;
    }

    .faculty-card h5 {
        margin-top: 14px;
        font-size: 18px;
        color: var(--navy);
        font-family: "Segoe UI", sans-serif;
    }

    .faculty-card h6 {
        margin-top: 6px;
        font-size: 14px;
        color: var(--muted);
        font-weight: 600;
    }

    /* ANIMATIONS */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style></head>
<body>
    <!-- HEADER -->
    <header>
        <div><img src="../assets/images/vsulogo.png" width="100px" height="100px"></div>
        <div><h2>Vikrama Simhapuri University</h2></div>
        <div><img src="../assets/images/naac_new.png" width="100px" height="100px"></div>
    </header>

    <!-- NAVIGATION -->
    <nav>
        <div><a href="index.html">Home</a></div>
        <div><a href="contactpage.html">Contact</a></div>
        <div>
            <a href="#">Menu</a>
            <div class="menu">
                <div><a href="Login.html">Register</a></div>
                <div><a href="Result.html">Result</a></div>
            </div>
        </div>
    </nav>

    <section>
        <div class="faculty-card">
            <img src="../assets/images/apsir.jpeg" alt="Prof. Ande Prasad">
            <h5>Prof. Dr. Ande Prasad</h5>
            <h6>MSC, MPhil, MTech, PhD</h6>
        </div>

        <div class="faculty-card">
            <img src="../assets/images/hussainsir.jpeg" alt="Dr. M Ussenaiah">
            <h5>Dr. M Ussenaiah</h5>
            <h6>MCA, PhD</h6>
        </div>

        <div class="faculty-card">
            <img src="../assets/images/vijayamadam.jpeg" alt="Dr. G Vijaya Lakshmi">
            <h5>Dr. G Vijaya Lakshmi</h5>
            <h6>BTech, MTech, PhD</h6>
        </div>
    </section>
</body>
</html>
