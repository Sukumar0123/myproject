<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manager Login</title>
 <style>

:root{
  --navy:#0b2e4a;
  --navy2:#08304f;
  --saffron:#ff9933;
  --bg:#f5f7fa;
  --card:#ffffff;
  --text:#1f2a37;
  --border:#d9e2ec;
  --shadow:0 6px 18px rgba(11,46,74,0.15);
}

body{
  font-family: Arial, sans-serif;
  background: var(--bg);
  height: 100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0;
}

/* LOGIN CARD */
section{
  background: var(--card);
  padding:35px 40px;
  border-radius:14px;
  border:1px solid var(--border);
  box-shadow: var(--shadow);
  width:330px;
  position:relative;
}

/* GOVT ACCENT BAR */
section::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:5px;
  background: var(--saffron);
  border-radius:14px 14px 0 0;
}

/* TITLE */
h1{
  text-align:center;
  color:var(--navy);
  margin-bottom:20px;
  font-family:"Segoe UI",sans-serif;
}

/* LABEL */
label{
  display:block;
  margin-top:12px;
  color:var(--navy);
  font-weight:bold;
}

/* INPUTS */
input[type="text"],
input[type="password"]{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:6px;
  border:1px solid var(--border);
  outline:none;
  font-size:14px;
}

input[type="text"]:focus,
input[type="password"]:focus{
  border-color:var(--navy);
  box-shadow:0 0 5px rgba(11,46,74,0.25);
}

/* BUTTON AREA */
.btn-container{
  display:flex;
  justify-content:space-between;
  margin-top:22px;
  gap:10px;
}

/* CANCEL BUTTON */
.btn{
  display:inline-block;
  padding:10px 18px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
  transition:0.3s;
  text-align:center;
  text-decoration:none;
  color:white;
}

.btn-cancel{
  background:#c0392b;
}

.btn-cancel:hover{
  background:#a93226;
}

/* SUBMIT BUTTON */
input[type="submit"]{
  padding:10px 18px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
  transition:0.3s;
  background:var(--navy);
  color:white;
}

input[type="submit"]:hover{
  background:#06233a;
}

</style>
</head>
<body>

<section>
  <!-- ✅ Correct: JSP is inside /jsp -->
  <form action="../jsp/RedirectThePage.jsp" method="post">
    <h1>Login Only Manager</h1>

    <label>Enter Name:</label>
    <input type="text" name="name" required>

    <label>Enter Password:</label>
    <input type="password" name="psw" required>

    <div class="btn-container">
      <!-- ✅ Correct: Use <a> as button (no button inside anchor or anchor inside button) -->
      <a class="btn btn-cancel" href="index.html">Cancel</a>
      <input type="submit" value="Submit">
    </div>
  </form>
</section>

</body>
</html>
