<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manager Login</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      height: 100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0;
    }
    section{
      background:#fff;
      padding:30px 40px;
      border-radius:12px;
      box-shadow:0px 4px 20px rgba(0,0,0,0.2);
      width:320px;
    }
    h1{ text-align:center; color:#333; margin-bottom:20px; }
    label{ display:block; margin-top:10px; color:#555; font-weight:bold; }
    input[type="text"], input[type="password"]{
      width:100%;
      padding:10px;
      margin-top:5px;
      border-radius:6px;
      border:1px solid #ccc;
      outline:none;
      font-size:14px;
    }
    .btn-container{
      display:flex;
      justify-content:space-between;
      margin-top:20px;
      gap:10px;
    }
    .btn{
      display:inline-block;
      padding:10px 18px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-size:14px;
      transition:0.3s;
      text-align:center;
      text-decoration:none;
      color:white;
    }
    .btn-cancel{ background:#ff4b5c; }
    .btn-cancel:hover{ background:#e63a4a; }

    input[type="submit"]{
      padding:10px 18px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-size:14px;
      transition:0.3s;
      background:#2575fc;
      color:white;
    }
    input[type="submit"]:hover{ background:#1b5cd6; }
  </style>
</head>
<body>

<section>
  <!-- ✅ Correct: JSP is inside /jsp -->
  <form action="../jsp/RedirectThePage.jsp" method="post">
    <h1>Login Only Manager</h1>

    <label>Enter Name:</label>
    <input type="text" name="name" required>

    <label>Enter Password:</label>
    <input type="password" name="psw" required>

    <div class="btn-container">
      <!-- ✅ Correct: Use <a> as button (no button inside anchor or anchor inside button) -->
      <a class="btn btn-cancel" href="index.html">Cancel</a>
      <input type="submit" value="Submit">
    </div>
  </form>
</section>

</body>
</html>
