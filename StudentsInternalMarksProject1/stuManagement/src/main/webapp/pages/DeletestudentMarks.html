<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Student Data</title>
   <style>

:root{
    --navy:#0b2e4a;
    --navy2:#08304f;
    --saffron:#ff9933;
    --bg:#f5f7fa;
    --card:#ffffff;
    --text:#1f2a37;
    --border:#d9e2ec;
    --shadow:0 6px 18px rgba(11,46,74,0.15);
}

body {
    font-family: Arial, sans-serif;
    background: var(--bg);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
}

/* FORM CARD */
section {
    background-color: var(--card);
    padding: 35px 40px;
    border-radius: 14px;
    border:1px solid var(--border);
    box-shadow: var(--shadow);
    width: 340px;
    position: relative;
}

/* GOVT ACCENT BAR */
section::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:5px;
    background: var(--saffron);
    border-radius:14px 14px 0 0;
}

h1 {
    text-align: center;
    color: var(--navy);
    margin-bottom: 20px;
    font-family:"Segoe UI",sans-serif;
}

label {
    display: block;
    margin-top: 12px;
    color: var(--navy);
    font-weight: bold;
}

input[type="text"],
input[type="password"] {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 6px;
    border: 1px solid var(--border);
    outline: none;
    font-size: 14px;
}

input[type="text"]:focus,
input[type="password"]:focus {
    border-color: var(--navy);
    box-shadow: 0 0 5px rgba(11,46,74,0.25);
}

.btn-container {
    display: flex;
    justify-content: space-between;
    margin-top: 22px;
}

button,
input[type="submit"] {
    padding: 10px 18px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
}

/* Cancel button */
button {
    background-color: #c0392b;
    color: white;
}

button:hover {
    background-color: #a93226;
}

/* Delete button */
input[type="submit"] {
    background-color: var(--navy);
    color: white;
}

input[type="submit"]:hover {
    background-color: #06233a;
}

button a{
    color:white;
    text-decoration:none;
}

</style>
</head>
<body>
    <section>
        <form>
            <h1>Delete Student Marks</h1>
            <label>Enter Name:</label>
            <input type="text" required>
            <label>Enter Hall Ticket:</label>
            <input type="password" required>
            <div class="btn-container">
                <button type="button"><a href="Registratin.html" style="text-decoration: none;">Cancel</a></button>
                <input type="submit" value="Delete">
            </div>
        </form>
    </section>
</body>
</html>
