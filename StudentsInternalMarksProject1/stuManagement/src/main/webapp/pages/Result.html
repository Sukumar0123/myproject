<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>
    <style>

:root{
    --navy:#0b2e4a;
    --navy2:#08304f;
    --saffron:#ff9933;
    --bg:#f5f7fa;
    --card:#ffffff;
    --text:#1f2a37;
    --border:#d9e2ec;
    --shadow:0 6px 18px rgba(11,46,74,0.15);
}

/* BODY */
body{
    font-family:Arial;
    background:var(--bg);
    margin:0;
    text-align:center;
    color:var(--text);
}

/* HEADER */
header{
    display:flex;
    justify-content:space-evenly;
    align-items:center;
    padding:18px;
    background:linear-gradient(90deg,var(--navy),var(--navy2));
    color:white;
    border-bottom:4px solid var(--saffron);
}

header img{
    border-radius:50%;
    background:white;
    padding:6px;
    box-shadow:0 6px 16px rgba(0,0,0,0.25);
}

/* NAVIGATION */
nav{
    display:flex;
    justify-content:center;
    background:white;
    padding:10px;
    border-bottom:1px solid var(--border);
}

nav div{
    margin:0 12px;
    position:relative;
}

nav a{
    text-decoration:none;
    color:var(--navy);
    font-weight:bold;
    padding:8px 12px;
    border-radius:6px;
}

nav a:hover{
    background:rgba(255,153,51,0.15);
}

/* DROPDOWN */
.menu{
    display:none;
    position:absolute;
    background:white;
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px;
    box-shadow:var(--shadow);
}

nav div:hover .menu{
    display:block;
}

/* FORM CARD */
section{
    background:var(--card);
    padding:30px 40px;
    border-radius:12px;
    border:1px solid var(--border);
    box-shadow:var(--shadow);
    width:350px;
    margin:auto;
    margin-top:40px;
    position:relative;
}

/* ACCENT BAR */
section::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:4px;
    background:var(--saffron);
    border-radius:12px 12px 0 0;
}

/* TITLE */
section h1{
    text-align:center;
    color:var(--navy);
    font-size:24px;
    margin-bottom:20px;
}

/* LABEL */
label{
    font-weight:bold;
    color:var(--navy);
    display:block;
    margin-top:10px;
    font-size:14px;
}

/* INPUTS */
input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid var(--border);
    border-radius:6px;
    font-size:14px;
}

input:focus,select:focus{
    border-color:var(--navy);
    outline:none;
    box-shadow:0 0 5px rgba(11,46,74,0.25);
}

/* BUTTON */
input[type="submit"]{
    background:var(--navy);
    color:white;
    border:none;
    cursor:pointer;
    font-size:15px;
    font-weight:bold;
    margin-top:20px;
    padding:10px;
}

input[type="submit"]:hover{
    background:#06233a;
}

</style>
</head>
<body>
    <header>
    <div><img src="../assets/images/vsulogo.png" width="100px"></div>
    <div><h2>Vikrama Simhapuri University</h2></div>
    <div><img src="../assets/images/naac_new.png" width="100px" height="100px"></div>
</header>

<nav>
    <div><a href="index.html">Home</a></div>
    <div><a href="contactpage.html">Contact</a></div>
    <div>
        <a href="#">Menu</a>
        <div class="menu">
           <div><a href="Login.html">Register</a></div>
            <div><a href="Result.html">Result</a></div>
        </div>
    </div>
</nav>
<section>
    <form action="../jsp/ResultHallTicket.jsp" method="post">
        <h1>Result</h1>
          <label>Enter Full Name</label>
        <input type="text" name="name" required>
        <label>Enter Hall Ticket</label>
        <input type="text" name="htnum" required>
        
        <label>Year</label>
        <select required>
            <option value="">Select</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
        </select>
        
        <input type="submit" value="Submit">
    </form>
</section>

</body>
</html>
