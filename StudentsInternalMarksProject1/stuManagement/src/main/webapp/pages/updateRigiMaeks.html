<!DOCTYPE html>

<title>SSC Registration Form</title>
<style>
:root{
    --navy:#0b2e4a;
    --navy2:#08304f;
    --saffron:#ff9933;
    --bg:#f5f7fa;
    --card:#ffffff;
    --text:#1f2a37;
    --muted:#6b7280;
    --border:#d9e2ec;
    --shadow:0 6px 18px rgba(11,46,74,0.15);
}

body{
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--bg);
    padding:20px;
    color: var(--text);
}

/* FORM CARD */
.form-container{
    background: var(--card);
    border-radius:14px;
    padding:28px;
    max-width:950px;
    margin:auto;
    box-shadow: var(--shadow);
    border:1px solid var(--border);
    position:relative;
}

/* GOVT ACCENT BAR */
.form-container::before{
    content:"";
    position:absolute;
    top:0; left:0;
    width:100%;
    height:5px;
    background: var(--saffron);
    border-radius:14px 14px 0 0;
}

h2{
    text-align:center;
    color: var(--navy);
    margin-bottom:18px;
    font-family:"Segoe UI",sans-serif;
}

/* LABEL */
label{
    font-weight:700;
    color: var(--navy);
    display:block;
    margin:10px 0 5px;
}

/* INPUTS / SELECT */
input, select{
    width:100%;
    padding:9px;
    border:1px solid var(--border);
    border-radius:6px;
    outline:none;
    transition:0.25s;
    background:#ffffff;
    color: var(--text);
}

input:focus, select:focus{
    border-color: var(--navy);
    box-shadow: 0 0 5px rgba(11,46,74,0.25);
}

/* FORM ROW */
.form-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}
.form-row div{
    flex:1;
    min-width:150px;
}

/* TABLE */
.subject-table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
}

.subject-table th{
    background: linear-gradient(90deg, var(--navy), var(--navy2));
    color:white;
    padding:10px;
    text-align:center;
    font-size:14px;
}

.subject-table td{
    padding:8px;
    text-align:center;
    background:#ffffff;
    border:1px solid var(--border);
}

.subject-table tr:nth-child(even) td{
    background:#f8fafc;
}

/* BUTTONS */
button{
    background: var(--navy);
    color:white;
    padding:11px 25px;
    border:none;
    border-radius:6px;
    font-size:15px;
    cursor:pointer;
    transition:0.25s;
    display:inline-block;
    margin:18px 8px 0 0;
}

button:hover{
    background:#06233a;
}

button a{
    text-decoration:none;
    color:white;
}
</style>
</head>
